# [ coa brain unit ]
# family: archlinux
# area:   initrd
# --------------------------------------------------
# Facciamo uno "swap" temporaneo: salviamo l'originale, iniettiamo il nostro, 
# rigeneriamo l'initrd con i preset, e ripristiniamo IMMEDIATAMENTE l'originale.
# Usiamo il ';' finale così il ripristino avviene anche se mkinitcpio dovesse fallire!
command: "mv /etc/mkinitcpio.conf /etc/mkinitcpio.conf.bak && cp /etc/coa-mkinitcpio.conf /etc/mkinitcpio.conf && mkinitcpio -P; mv /etc/mkinitcpio.conf.bak /etc/mkinitcpio.conf"

setup_files:
  "/etc/coa-mkinitcpio.conf": |
    MODULES=(loop overlay squashfs)
    BINARIES=()
    FILES=()
    # Niente autodetect, solo gli hook per la Live
    HOOKS=(base udev microcode modconf kms memdisk archiso archiso_loop_mnt archiso_pxe_common archiso_pxe_nbd archiso_pxe_http archiso_pxe_nfs block filesystems keyboard keymap consolefont fsck)
    COMPRESSION="zstd"