name: HW Detect CI

on:
  push:
    paths:
      - scripts/hw-detect.sh
      - scripts/hw-build-env.sh
      - scripts/kport/kport-detect*.sh
      - scripts/kport/kport-build-flags.sh
      - scripts/kport/kport-toolchain.sh
      - config/hardware.conf.tpl
  pull_request:
    paths:
      - scripts/hw-detect.sh
      - scripts/hw-build-env.sh
      - scripts/kport/kport-detect*.sh
      - scripts/kport/kport-build-flags.sh
      - scripts/kport/kport-toolchain.sh
      - config/hardware.conf.tpl
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

jobs:
  detect:
    name: detect (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
          - arch: i386
            runner: ubuntu-latest
            qemu: true
          - arch: riscv64
            runner: ubuntu-latest
            qemu: true

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU (i386 / riscv64)
        if: ${{ matrix.qemu == true }}
        uses: docker/setup-qemu-action@v4
        with:
          platforms: ${{ matrix.arch }}

      - name: Set CPU_ARCH environment variable
        run: echo "CPU_ARCH=${{ matrix.arch }}" >> $GITHUB_ENV

      - name: Run hw-detect (native amd64 / arm64)
        if: ${{ matrix.qemu != true }}
        run: |
          bash scripts/hw-detect.sh --json | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print('CPU_ARCH:', d.get('CPU_ARCH','?'))
          print('CPU_TIER:', d.get('CPU_TIER','?'))
          print('GPU_TIER:', d.get('GPU_TIER','?'))
          print('NPU_TIER:', d.get('NPU_TIER','?'))
          for key in ['CPU_ARCH','CPU_TIER','GPU_TIER','NPU_TIER']:
              assert d.get(key), f'Missing or empty: {key}'
          print('All required fields present.')
          "

      - name: Run hw-detect (QEMU ${{ matrix.arch }})
        if: ${{ matrix.qemu == true }}
        run: |
          docker run --rm --platform linux/${{ matrix.arch }} \
            -v "${{ github.workspace }}:/repo" \
            -e CPU_ARCH=${{ matrix.arch }} \
            debian:sid-slim \
            bash /repo/scripts/hw-detect.sh --json \
          | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print('CPU_ARCH:', d.get('CPU_ARCH','?'))
          print('CPU_TIER:', d.get('CPU_TIER','?'))
          print('GPU_TIER:', d.get('GPU_TIER','?'))
          print('NPU_TIER:', d.get('NPU_TIER','?'))
          for key in ['CPU_ARCH','CPU_TIER','GPU_TIER','NPU_TIER']:
              assert d.get(key), f'Missing or empty: {key}'
          print('All required fields present.')
          "

  build-env:
    name: build-env (${{ matrix.arch }})
    needs: detect
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
          - arch: i386
            runner: ubuntu-latest
            qemu: true
          - arch: riscv64
            runner: ubuntu-latest
            qemu: true

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU (i386 / riscv64)
        if: ${{ matrix.qemu == true }}
        uses: docker/setup-qemu-action@v4
        with:
          platforms: ${{ matrix.arch }}

      - name: Validate --export output (native)
        if: ${{ matrix.qemu != true }}
        run: |
          eval "$(bash scripts/hw-build-env.sh --export 2>/dev/null)"
          python3 - <<'EOF'
          import os, sys
          required = [
              'KPORT_ARCH', 'KPORT_CFLAGS', 'KPORT_CMAKE_ARGS',
              'KPORT_MAKE_ARGS', 'KPORT_GPU_BACKEND', 'KPORT_NPU_BACKEND',
          ]
          missing = [k for k in required if not os.environ.get(k)]
          if missing:
              print('MISSING or empty:', missing, file=sys.stderr)
              sys.exit(1)
          for k in required:
              print(f'{k}={os.environ[k]!r}')
          print('All KPORT_* variables present.')
          EOF

      - name: Validate --json output (native)
        if: ${{ matrix.qemu != true }}
        run: |
          bash scripts/hw-build-env.sh --json 2>/dev/null | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          required = [
              'CPU_ARCH', 'CPU_TIER', 'GPU_TIER', 'NPU_TIER',
              'KPORT_ARCH', 'KPORT_CFLAGS', 'KPORT_CMAKE_ARGS',
              'KPORT_MAKE_ARGS', 'KPORT_GPU_BACKEND', 'KPORT_NPU_BACKEND',
          ]
          missing = [k for k in required if not d.get(k)]
          if missing:
              print('MISSING or empty:', missing, file=sys.stderr)
              sys.exit(1)
          for k in required:
              print(f'{k}:', d[k])
          print('JSON output well-formed.')
          "

      - name: Validate --export output (QEMU ${{ matrix.arch }})
        if: ${{ matrix.qemu == true }}
        run: |
          docker run --rm --platform linux/${{ matrix.arch }} \
            -v "${{ github.workspace }}:/repo" \
            -e CPU_ARCH=${{ matrix.arch }} \
            debian:sid-slim \
            bash -c '
              eval "$(bash /repo/scripts/hw-build-env.sh --export 2>/dev/null)"
              python3 - <<EOF
          import os, sys
          required = [
              "KPORT_ARCH", "KPORT_CFLAGS", "KPORT_CMAKE_ARGS",
              "KPORT_MAKE_ARGS", "KPORT_GPU_BACKEND", "KPORT_NPU_BACKEND",
          ]
          missing = [k for k in required if not os.environ.get(k)]
          if missing:
              print("MISSING or empty:", missing, file=sys.stderr)
              sys.exit(1)
          for k in required:
              print(f"{k}={os.environ[k]!r}")
          print("All KPORT_* variables present.")
          EOF
            '

      - name: Validate --json output (QEMU ${{ matrix.arch }})
        if: ${{ matrix.qemu == true }}
        run: |
          docker run --rm --platform linux/${{ matrix.arch }} \
            -v "${{ github.workspace }}:/repo" \
            -e CPU_ARCH=${{ matrix.arch }} \
            debian:sid-slim \
            bash /repo/scripts/hw-build-env.sh --json 2>/dev/null \
          | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          required = [
              'CPU_ARCH', 'CPU_TIER', 'GPU_TIER', 'NPU_TIER',
              'KPORT_ARCH', 'KPORT_CFLAGS', 'KPORT_CMAKE_ARGS',
              'KPORT_MAKE_ARGS', 'KPORT_GPU_BACKEND', 'KPORT_NPU_BACKEND',
          ]
          missing = [k for k in required if not d.get(k)]
          if missing:
              print('MISSING or empty:', missing, file=sys.stderr)
              sys.exit(1)
          for k in required:
              print(f'{k}:', d[k])
          print('JSON output well-formed.')
          "

      - name: Validate cross-compile env (amd64 → arm64 only)
        if: ${{ matrix.arch == 'amd64' }}
        run: |
          sudo apt-get install -y -q gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu 2>/dev/null
          eval "$(bash scripts/hw-build-env.sh --export --cross arm64 2>/dev/null)"
          python3 - <<'EOF'
          import os, sys
          cross_vars = ['CC', 'CXX', 'AR', 'STRIP', 'CMAKE_TOOLCHAIN_FILE', 'CARGO_BUILD_TARGET']
          missing = [k for k in cross_vars if not os.environ.get(k)]
          if missing:
              print('MISSING cross vars:', missing, file=sys.stderr)
              sys.exit(1)
          for k in cross_vars:
              print(f'{k}={os.environ[k]!r}')
          assert 'aarch64' in os.environ.get('CC',''), f"CC does not look like an aarch64 compiler: {os.environ.get('CC')}"
          assert os.environ.get('CARGO_BUILD_TARGET') == 'aarch64-unknown-linux-gnu', \
              f"Unexpected CARGO_BUILD_TARGET: {os.environ.get('CARGO_BUILD_TARGET')}"
          print('Cross-compile vars correct.')
          EOF